<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{margin:0;background:#0a0a0f;font-family:-apple-system;color:white;display:flex;justify-content:center;}
.app{width:100%;max-width:420px;padding:16px;}
h2{text-align:center;margin:20px 0;}

.card{background:#15151d;padding:14px;border-radius:16px;margin-bottom:12px;}
.label{font-size:13px;color:#aaa;margin-bottom:6px;}

input,select,textarea{
width:100%;padding:12px;border-radius:12px;border:none;
background:#1f1f28;color:white;font-size:15px;box-sizing:border-box;margin-bottom:10px;
}

textarea{resize:none;height:90px;}

button{
width:100%;padding:14px;border:none;border-radius:14px;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;font-size:16px;margin-top:10px;
}

.tag{
display:inline-block;padding:6px 10px;background:#1f1f28;
border-radius:10px;margin:4px;font-size:13px;
}
.tag.active{background:#6d5dfc;}

.hidden{display:none;}

/* PIN */
.pin-box{display:flex;justify-content:center;gap:10px;margin:20px 0;}
.pin-cell{width:50px;height:50px;border-radius:12px;border:2px solid #333;display:flex;align-items:center;justify-content:center;}
.pin-dot{width:8px;height:8px;background:white;border-radius:50%;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;justify-items:center;}
.pin-btn{width:70px;height:70px;border-radius:50%;background:#1c1c24;display:flex;align-items:center;justify-content:center;font-size:20px;}

/* 🔥 ВЫБРОС */
.waste-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-radius:14px;
margin-bottom:8px;
background:#1a1a22;
transition:0.2s;
}

.waste-row.active{
background:linear-gradient(135deg,#6d5dfc22,#8b7cff22);
border:1px solid #6d5dfc;
}

.waste-input{
width:70px;
padding:8px;
border-radius:10px;
background:#0f0f15;
text-align:center;
opacity:0;
transform:scale(0.9);
transition:0.2s;
}

.waste-input.show{
opacity:1;
transform:scale(1);
}

.add-btn{margin-top:10px;background:#1f1f28;text-align:center;padding:10px;border-radius:10px;}
</style>
</head>

<body>
<div class="app">

<!-- LOGIN -->
<div id="login">
<h2>Кто менеджер</h2>
<button onclick="selectUser('Егор')">Егор</button>
<button onclick="selectUser('Стас')">Стас</button>
<button onclick="selectUser('Денис')">Денис</button>
</div>

<!-- PIN -->
<div id="pin" class="hidden">
<h2>Введите PIN</h2>
<div class="pin-box">
<div class="pin-cell"></div><div class="pin-cell"></div>
<div class="pin-cell"></div><div class="pin-cell"></div>
</div>
<div class="pin-pad" id="pad"></div>
</div>

<!-- LOADING -->
<div id="loading" class="hidden"><h2>⏳ Проверка...</h2></div>

<!-- FORM -->
<div id="form" class="hidden">

<h2>Отчет смены</h2>

<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<!-- ВЫБРОС -->
<div class="card">
<div class="label">Выброс продукции</div>
<div id="wasteList"></div>
</div>

<button onclick="alert(JSON.stringify(state.waste,null,2))">Проверка данных</button>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzKqNQrcOo5it_hb21N8TjXJm8MP6Q_suN071vT5tbMms2p8f30brF5xW9ymLqTdLc9vQ/exec";

let state={
user:"",
pin:"",
waste:{}
};

/* NAV */
function show(id){
["login","pin","form","loading"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

/* LOGIN */
function selectUser(name){
state.user=name;
state.pin="";
updatePin();
show("pin");
}

/* PIN */
const pad=document.getElementById("pad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
const b=document.createElement("div");
b.className="pin-btn";
b.innerText=n;

b.onclick=()=>{
if(n==="←"){state.pin=state.pin.slice(0,-1);}
else if(state.pin.length<4){state.pin+=n;}

updatePin();

if(state.pin.length===4){
checkPin();
}
};

pad.appendChild(b);
});

function updatePin(){
document.querySelectorAll(".pin-cell").forEach((c,i)=>{
c.innerHTML=i<state.pin.length?"<div class='pin-dot'></div>":"";
});
}

async function checkPin(){
show("loading");

const res=await fetch(SCRIPT_URL,{
method:"POST",
body: JSON.stringify({
type:"auth",
user:state.user,
pin:state.pin
})
});

const json=await res.json();

if(json.status==="ok"||json.status==="created"){
show("form");
date.valueAsDate=new Date();
}else{
alert("Неверный PIN");
state.pin="";
updatePin();
show("pin");
}
}

/* 🔥 ВЫБРОС */
const wasteProducts=[
"Котлеты","Куриная Грудка","Шницелоним","Шницели","Шаурма","Бийонд",
"Бургул","Рис","Тхина","Чимичури","Чипотле","Острый лимон","Гуакамоли",
"Сальса","Соус Чедар","Пельпель Калуи","Колслоу","Квашенная капуста",
"Пюре","Десерты"
];

wasteProducts.forEach(p=>{

const row=document.createElement("div");
row.className="waste-row";

const name=document.createElement("div");
name.innerText=p;

const input=document.createElement("input");
input.type="number";
input.placeholder="л";
input.className="waste-input";

input.oninput=()=>{
if(input.value){
state.waste[p]=input.value;
}else{
delete state.waste[p];
}
};

row.onclick=()=>{
const active=row.classList.contains("active");

if(active){
row.classList.remove("active");
input.classList.remove("show");
input.value="";
delete state.waste[p];
}else{
row.classList.add("active");
input.classList.add("show");
input.focus();
}
};

row.appendChild(name);
row.appendChild(input);
wasteList.appendChild(row);

});

</script>
</body>
</html>
