<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{margin:0;background:#0a0a0f;font-family:-apple-system;color:white;display:flex;justify-content:center;}
.app{width:100%;max-width:420px;padding:16px;}
h2{text-align:center;margin:20px 0;}

.card{background:#15151d;padding:14px;border-radius:16px;margin-bottom:12px;}
.label{font-size:13px;color:#aaa;margin-bottom:6px;}

input,select,textarea{
width:100%;padding:12px;border-radius:12px;border:none;
background:#1f1f28;color:white;font-size:15px;box-sizing:border-box;
}

textarea{resize:none;height:90px;}

button{
width:100%;padding:14px;border:none;border-radius:14px;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;font-size:16px;margin-top:10px;
}

.tag{
display:inline-block;padding:6px 10px;background:#1f1f28;
border-radius:10px;margin:4px;font-size:13px;
}

.tag.active{background:#6d5dfc;}

.hidden{display:none;}

.pin-box{display:flex;justify-content:center;gap:10px;margin:20px 0;}
.pin-cell{width:50px;height:50px;border-radius:12px;border:2px solid #333;display:flex;align-items:center;justify-content:center;}
.pin-dot{width:8px;height:8px;background:white;border-radius:50%;}

.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;justify-items:center;}
.pin-btn{width:70px;height:70px;border-radius:50%;background:#1c1c24;display:flex;align-items:center;justify-content:center;font-size:20px;}
</style>
</head>

<body>
<div class="app">

<!-- LOGIN -->
<div id="login">
<h2>Кто менеджер</h2>
<button onclick="selectUser('Егор')">Егор</button>
<button onclick="selectUser('Стас')">Стас</button>
<button onclick="selectUser('Денис')">Денис</button>
</div>

<!-- PIN -->
<div id="pin" class="hidden">
<h2>Введите PIN</h2>
<div class="pin-box">
<div class="pin-cell"></div><div class="pin-cell"></div>
<div class="pin-cell"></div><div class="pin-cell"></div>
</div>
<div class="pin-pad" id="pad"></div>
</div>

<!-- FORM -->
<div id="form" class="hidden">

<h2>Отчет смены</h2>

<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">Смена</div>
<select id="shift"><option>Утро</option><option>Вечер</option></select>
</div>

<div class="card">
<div class="label">Готовность кухни</div>
<select id="ready" onchange="checkReady()">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>
</div>

<div id="lowBlock" class="card hidden">
<div class="label">Причина</div>
<textarea id="lowReason"></textarea>
<input type="file" id="lowPhoto">
</div>

<!-- РАСПРЕДЕЛЕНИЕ -->
<div class="card">
<div class="label">Распределение</div>
<select id="pos1"><option>Гриль</option></select>
<select id="pos2"><option>Сборка</option></select>
<select id="pos3"><option>Заготовки</option></select>
</div>

<!-- ВЫБРОС -->
<div class="card">
<div class="label">Выброс продукции</div>
<div id="waste"></div>
</div>

<!-- ОПИСАНИЕ -->
<div class="card">
<div class="label">Описание смены</div>
<textarea id="summary"></textarea>

<div id="hints"></div>
</div>

<!-- ПРОБЛЕМЫ -->
<div class="card">
<div class="label">Проблемы</div>
<textarea id="problem"></textarea>
<input type="file" id="problemPhoto">
</div>

<button onclick="goTraining()">Далее →</button>

</div>

<!-- TRAINING -->
<div id="training" class="hidden">
<h2>Ученичество</h2>

<div class="card">
<select id="student">
<option>Нет</option>
<option>Егор</option>
<option>Стас</option>
<option>Денис</option>
<option>Яков</option>
<option>Алекс</option>
</select>
</div>

<div class="card">
<textarea id="study"></textarea>
</div>

<button onclick="send()">Отправить</button>
</div>

<div id="loading" class="hidden"><h2>⏳ Отправка...</h2></div>
<div id="done" class="hidden"><h2>Спасибо ✅</h2></div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzKqNQrcOo5it_hb21N8TjXJm8MP6Q_suN071vT5tbMms2p8f30brF5xW9ymLqTdLc9vQ/exec";

let state={user:"",pin:"",waste:{}};

/* NAV */
function show(id){
["login","pin","form","training","done","loading"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

/* LOGIN */
function selectUser(name){
state.user=name;state.pin="";
updatePin();show("pin");
}

/* PIN */
const pad=document.getElementById("pad");
[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
const b=document.createElement("div");
b.className="pin-btn";b.innerText=n;
b.onclick=async ()=>{
if(n==="←"){state.pin=state.pin.slice(0,-1);}
else if(state.pin.length<4){state.pin+=n;}
updatePin();
if(state.pin.length===4){await checkPin();}
};
pad.appendChild(b);
});

function updatePin(){
document.querySelectorAll(".pin-cell").forEach((c,i)=>{
c.innerHTML=i<state.pin.length?"<div class='pin-dot'></div>":"";
});
}

async function checkPin(){
const res=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({type:"auth",user:state.user,pin:state.pin})});
const j=await res.json();
if(j.status==="ok"||j.status==="created"){show("form");date.valueAsDate=new Date();}
else{alert("Неверный PIN");state.pin="";updatePin();}
}

/* READY */
function checkReady(){lowBlock.classList.toggle("hidden",ready.value>=4);}

/* WASTE с количеством */
const products=["Курица","Котлеты","Сальса","Гуакамоле"];
products.forEach(p=>{
const t=document.createElement("div");
t.className="tag";t.innerText=p;

const input=document.createElement("input");
input.type="number";input.min=1;input.style.width="60px";

t.onclick=()=>{
if(!state.waste[p]){
state.waste[p]=1;
t.classList.add("active");
t.appendChild(input);
}else{
delete state.waste[p];
t.classList.remove("active");
input.remove();
}
};

input.oninput=()=>state.waste[p]=input.value;

waste.appendChild(t);
});

/* ПОДСКАЗКИ */
const hintsArr=[
"Большая нагрузка","Нехватка персонала","Задержки заказов","Ошибки сборки",
"Медленная кухня","Проблемы с поставками","Очередь","Не хватило заготовок",
"Долгое ожидание","Путаница в заказах","Перегруз кухни","Нет ингредиентов"
];

hintsArr.forEach(h=>{
const t=document.createElement("div");
t.className="tag";t.innerText=h;
t.onclick=()=>summary.value+=h+", ";
hints.appendChild(t);
});

/* BASE64 */
function toBase64(file){
return new Promise(res=>{
if(!file)return res("");
const r=new FileReader();
r.onload=()=>res(r.result.split(",")[1]);
r.readAsDataURL(file);
});
}

/* NAV */
function goTraining(){
if(!date.value)return alert("Выбери дату");
show("training");
}

/* SEND */
async function send(){

show("loading");

const photos={
problem:await toBase64(problemPhoto.files[0]),
low:await toBase64(lowPhoto.files[0])
};

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"report",
user:state.user,
date:date.value,
shift:shift.value,
ready:ready.value,
lowReason:lowReason.value,
summary:summary.value,
problem:problem.value,
waste:state.waste,
student:student.value,
study:study.value,
photos
})
});

show("done");
}

</script>
</body>
</html>
