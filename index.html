<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{margin:0;background:#0a0a0f;font-family:-apple-system;color:white;display:flex;justify-content:center;direction:rtl;text-align:right;}
.app{width:100%;max-width:420px;padding:16px;}
h2{text-align:center;margin:20px 0;}

.card{background:#15151d;padding:14px;border-radius:16px;margin-bottom:12px;}
.label{font-size:13px;color:#fff;margin-bottom:6px;font-weight:600;}

input,select,textarea{
width:100%;padding:12px;border-radius:12px;border:none;
background:#1f1f28;color:white;font-size:15px;margin-bottom:10px;
}

button{
width:100%;padding:14px;border:none;border-radius:14px;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;font-size:16px;margin-top:10px;
}

.tag{display:inline-block;padding:6px 10px;background:#1f1f28;border-radius:10px;margin:4px;font-size:13px;}
.tag.active{background:#6d5dfc;}
.hidden{display:none;}

.add-btn{background:#1a1a22;padding:10px;border-radius:10px;color:#aaa;text-align:center;}

.pin-box{display:flex;gap:10px;justify-content:center;margin:20px 0;}
.pin-cell{width:50px;height:50px;border:2px solid #333;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.pin-dot{width:8px;height:8px;background:white;border-radius:50%;}

.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.pin-btn{width:70px;height:70px;border-radius:50%;background:#1c1c24;display:flex;align-items:center;justify-content:center;}
</style>
</head>

<body>
<div class="app">

<div id="login">
<h2>מי המנהל</h2>
<button onclick="selectUser('יגור')">יגור</button>
<button onclick="selectUser('סטס')">סטס</button>
<button onclick="selectUser('דניס')">דניס</button>
</div>

<div id="pin" class="hidden">
<h2>הכנס קוד PIN</h2>
<div class="pin-box">
<div class="pin-cell"></div><div class="pin-cell"></div>
<div class="pin-cell"></div><div class="pin-cell"></div>
</div>
<div class="pin-pad" id="pad"></div>
</div>

<div id="loading" class="hidden">
<h2>⏳ בודק...</h2>
</div>

<div id="form" class="hidden">

<h2>דוח משמרת</h2>

<div class="card">
<div class="label">תאריך</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">משמרת</div>
<select id="shift"><option>בוקר</option><option>ערב</option></select>
</div>

<div class="card">
<div class="label">מוכנות המטבח</div>
<select id="ready">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>
</div>

<div class="card">
<div class="label">פסולת</div>
<div id="wasteList"></div>
</div>

<div class="card">
<div class="label">סיכום</div>
<textarea id="summary"></textarea>
</div>

<div class="card">
<div class="label">בעיות</div>
<textarea id="problem"></textarea>
</div>

<button onclick="send()">שלח</button>

</div>

<div id="done" class="hidden">
<h2>הדוח נשלח ✅</h2>
</div>

</div>

<script>

const SCRIPT_URL="ТВОЙ_URL";

let state={user:"",pin:"",waste:{}};

function show(id){
["login","pin","form","done","loading"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function selectUser(name){
state.user=name;
state.pin="";
updatePin();
show("pin");
}

/* PIN */
const pad=document.getElementById("pad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
const b=document.createElement("div");
b.className="pin-btn";
b.innerText=n;

b.onclick=()=>{
if(n==="←"){state.pin=state.pin.slice(0,-1);}
else if(state.pin.length<4){state.pin+=n;}

updatePin();

if(state.pin.length===4){
checkPin();
}
};

pad.appendChild(b);
});

function updatePin(){
document.querySelectorAll(".pin-cell").forEach((c,i)=>{
c.innerHTML=i<state.pin.length?"<div class='pin-dot'></div>":"";
});
}

async function checkPin(){
show("loading");

const res=await fetch(SCRIPT_URL,{
method:"POST",
body: JSON.stringify({
type:"auth",
user:state.user,
pin:state.pin
})
});

const json=await res.json();

if(json.status==="ok"||json.status==="created"){
show("form");
date.valueAsDate=new Date();
}else{
alert("קוד שגוי");
state.pin="";
updatePin();
show("pin");
}
}

/* ВЫБРОС */
const wasteItems=["קציצות","אורז","טחינה"];

wasteItems.forEach(p=>{
const tag=document.createElement("div");
tag.className="tag";
tag.innerText=p;

tag.onclick=()=>{
tag.classList.toggle("active");

if(tag.classList.contains("active")){
state.waste[p]=1;
}else{
delete state.waste[p];
}
};

wasteList.appendChild(tag);
});

/* SEND */
async function send(){
show("loading");

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
type:"report",
user:state.user,
date:date.value,
shift:shift.value,
ready:ready.value,
summary:summary.value,
problem:problem.value,
waste:state.waste
})
});

show("done");
}

</script>
</body>
</html>
