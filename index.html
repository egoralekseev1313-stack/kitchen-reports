<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{margin:0;background:#0a0a0f;font-family:-apple-system;color:white;display:flex;justify-content:center;direction:rtl;text-align:right;}
.app{width:100%;max-width:420px;padding:16px;}
h2{text-align:center;margin:20px 0;}

.card{background:#15151d;padding:14px;border-radius:16px;margin-bottom:12px;}
.label{font-size:13px;color:#ffffff;margin-bottom:6px;font-weight:600;}

input,select,textarea{
width:100%;padding:12px;border-radius:12px;border:none;
background:#1f1f28;color:white;font-size:15px;box-sizing:border-box;margin-bottom:10px;
}

textarea{resize:none;height:90px;}

button{
width:100%;padding:14px;border:none;border-radius:14px;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;font-size:16px;margin-top:10px;
}

.tag{display:inline-block;padding:6px 10px;background:#1f1f28;border-radius:10px;margin:4px;font-size:13px;}
.tag.active{background:#6d5dfc;}
.hidden{display:none;}

.add-btn{margin-top:10px;background:#1a1a22;text-align:center;padding:10px;border-radius:10px;font-size:14px;color:#aaa;}

button, .add-btn, .tag{transition:0.15s;}
button:active, .add-btn:active, .tag:active{transform:scale(0.96);opacity:0.7;}

.pin-box{display:flex;justify-content:center;gap:10px;margin:20px 0;}
.pin-cell{width:50px;height:50px;border-radius:12px;border:2px solid #333;display:flex;align-items:center;justify-content:center;}
.pin-dot{width:8px;height:8px;background:white;border-radius:50%;}

.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;justify-items:center;}
.pin-btn{width:70px;height:70px;border-radius:50%;background:#1c1c24;display:flex;align-items:center;justify-content:center;font-size:20px;}

.back-ios{color:#8b7cff;margin-bottom:10px;cursor:pointer;}
</style>
</head>

<body>
<div class="app">

<div id="login">
<h2>מי המנהל</h2>
<button onclick="selectUser('יגור')">יגור</button>
<button onclick="selectUser('סטס')">סטס</button>
<button onclick="selectUser('דניס')">דניס</button>
</div>

<div id="pin" class="hidden">
<h2>הכנס קוד PIN</h2>
<div class="pin-box">
<div class="pin-cell"></div><div class="pin-cell"></div>
<div class="pin-cell"></div><div class="pin-cell"></div>
</div>
<div class="pin-pad" id="pad"></div>
</div>

<div id="loading" class="hidden">
<h2>⏳ בודק...</h2>
</div>

<div id="form" class="hidden">

<h2>דוח משמרת</h2>

<div class="card">
<div class="label">תאריך</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">משמרת</div>
<select id="shift"><option>בוקר</option><option>ערב</option></select>
</div>

<div class="card">
<div class="label">מוכנות המטבח</div>
<select id="ready" onchange="checkReady()">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>
</div>

<div id="lowBlock" class="card hidden">
<div class="label">סיבה</div>
<textarea id="lowReason"></textarea>
<input type="file" id="lowPhoto">
</div>

<div class="card">
<div class="label">חלוקת עובדים</div>
<select id="hot"><option disabled selected>עמדה חמה</option></select>
<select id="cold"><option disabled selected>עמדה קרה</option></select>
<select id="check"><option disabled selected>בודק</option></select>
</div>

<div class="card">
<div class="label">פסולת (ליטר)</div>
<div class="add-btn" onclick="toggleWaste()">הצג / הסתר</div>
<div id="wasteList" class="hidden"></div>
</div>

<div class="card">
<div class="label">סיכום המשמרת</div>
<textarea id="summary"></textarea>
</div>

<div class="card">
<div class="label">הכנות</div>
<div id="prepContainer"></div>
<div class="add-btn" onclick="addPrep()">+ הוסף עובד</div>
</div>

<div class="card">
<div class="label">בעיות</div>
<textarea id="problem"></textarea>
<input type="file" id="problemPhoto">
</div>

<button onclick="goTraining()">הבא →</button>

</div>

<div id="training" class="hidden">
<h2>חניכה</h2>
<div class="back-ios" onclick="goBack()">← חזור</div>

<div class="card">
<div class="label">בחירת עובד</div>
<select id="student"></select>
</div>

<div class="card">
<div class="label">תיאור החניכה</div>
<textarea id="study"></textarea>
</div>

<button onclick="send()">שלח</button>
</div>

<div id="done" class="hidden">
<h2>הדוח נשלח ✅</h2>
<button onclick="location.reload()">דוח חדש</button>
</div>

</div>

<script>

const SCRIPT_URL="ТВОЙ_URL";

let state={user:"",pin:"",waste:{},prep:[]};

function show(id){
["login","pin","form","training","done","loading"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function selectUser(name){
state.user=name;
state.pin="";
updatePin();
show("pin");
}

const pad=document.getElementById("pad");
[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
const b=document.createElement("div");
b.className="pin-btn";
b.innerText=n;
b.onclick=()=>{
if(n==="←"){state.pin=state.pin.slice(0,-1);}
else if(state.pin.length<4){state.pin+=n;}
updatePin();
if(state.pin.length===4){checkPin();}
};
pad.appendChild(b);
});

function updatePin(){
document.querySelectorAll(".pin-cell").forEach((c,i)=>{
c.innerHTML=i<state.pin.length?"<div class='pin-dot'></div>":"";
});
}

async function checkPin(){
show("loading");
const res=await fetch(https://script.google.com/macros/s/AKfycbz12ZpoxZvsXISJ2hen9FJeZBZbhy6RCnBvYsODMGn5bwAaY9KgDpvsKG30IMizlL9OoQ/exec,{
method:"POST",
body: JSON.stringify({type:"auth",user:state.user,pin:state.pin})
});
const json=await res.json();

if(json.status==="ok"||json.status==="created"){
show("form");
date.valueAsDate=new Date();
}else{
alert("קוד שגוי");
state.pin="";
updatePin();
show("pin");
}
}

function checkReady(){
lowBlock.classList.toggle("hidden",ready.value>=4);
}

function toggleWaste(){
wasteList.classList.toggle("hidden");
}

const wasteGroups={
"בשר":["קציצות","חזה עוף","שווארמה"],
"תוספות":["אורז","פירה"],
"רטבים":["טחינה","סלסה"],
"קינוחים":["קינוחים"]
};

Object.entries(wasteGroups).forEach(([group, products])=>{
const title=document.createElement("div");
title.innerText=group;
wasteList.appendChild(title);

products.forEach(p=>{
const tag=document.createElement("div");
tag.className="tag";
tag.innerText=p;
tag.onclick=()=>tag.classList.toggle("active");
wasteList.appendChild(tag);
});
});

const prepItems=["גואקמולי","סלסה","אורז","פירה","טחינה"];
const workers=["יגור","סטס","דניס","יעקב","אלכס"];

function addPrep(){
state.prep.push({user:"",items:[]});
renderPrep();
}

function renderPrep(){
prepContainer.innerHTML="";
state.prep.forEach(block=>{
const select=document.createElement("select");
workers.forEach(w=>{
const o=document.createElement("option");
o.innerText=w;
select.appendChild(o);
});
prepContainer.appendChild(select);
});
}

addPrep();

function goTraining(){
if(!date.value)return alert("בחר תאריך");
show("training");
}

function goBack(){show("form");}

async function send(){
show("loading");
await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({type:"report",user:state.user})
});
show("done");
}

</script>
</body>
</html>
