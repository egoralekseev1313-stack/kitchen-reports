<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{margin:0;background:#0a0a0f;font-family:-apple-system;color:white;display:flex;justify-content:center;}
.app{width:100%;max-width:420px;padding:16px;}
h2{text-align:center;margin:20px 0;}

.card{background:#15151d;padding:14px;border-radius:16px;margin-bottom:12px;}
.label{font-size:13px;color:#aaa;margin-bottom:6px;}

input,select,textarea{
width:100%;padding:12px;border-radius:12px;border:none;
background:#1f1f28;color:white;font-size:15px;box-sizing:border-box;margin-bottom:10px;
}

textarea{resize:none;height:90px;}

button{
width:100%;padding:14px;border:none;border-radius:14px;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;font-size:16px;margin-top:10px;
}

.tag{
display:inline-block;padding:6px 10px;background:#1f1f28;
border-radius:10px;margin:4px;font-size:13px;cursor:pointer;
}

.tag.active{background:#6d5dfc;}
.hidden{display:none;}

.pin-box{display:flex;justify-content:center;gap:10px;margin:20px 0;}
.pin-cell{width:50px;height:50px;border-radius:12px;border:2px solid #333;display:flex;align-items:center;justify-content:center;}
.pin-dot{width:8px;height:8px;background:white;border-radius:50%;}

.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;justify-items:center;}
.pin-btn{width:70px;height:70px;border-radius:50%;background:#1c1c24;display:flex;align-items:center;justify-content:center;font-size:20px;}

.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.hints-toggle.active{background:#6d5dfc;}

.add-btn{
margin-top:10px;
background:#1f1f28;
text-align:center;
padding:10px;
border-radius:10px;
font-size:14px;
cursor:pointer;
}
</style>
</head>

<body>
<div class="app">

<!-- LOGIN -->
<div id="login">
<h2>Кто менеджер</h2>
<button onclick="selectUser('Егор')">Егор</button>
<button onclick="selectUser('Стас')">Стас</button>
<button onclick="selectUser('Денис')">Денис</button>
</div>

<!-- PIN -->
<div id="pin" class="hidden">
<h2>Введите PIN</h2>
<div class="pin-box">
<div class="pin-cell"></div><div class="pin-cell"></div>
<div class="pin-cell"></div><div class="pin-cell"></div>
</div>
<div class="pin-pad" id="pad"></div>
</div>

<!-- LOADING -->
<div id="loading" class="hidden">
<h2>⏳ Проверка...</h2>
</div>

<!-- FORM -->
<div id="form" class="hidden">

<h2>Отчет смены</h2>

<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">Смена</div>
<select id="shift"><option>Утро</option><option>Вечер</option></select>
</div>

<div class="card">
<div class="label">Готовность кухни</div>
<select id="ready" onchange="checkReady()">
<option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
</select>
</div>

<div id="lowBlock" class="card hidden">
<div class="label">Причина</div>
<textarea id="lowReason"></textarea>
<input type="file" id="lowPhoto">
</div>

<div class="card">
<div class="label">Распределение</div>
<select id="hot"><option disabled selected>Горячая сторона</option><option>Егор</option><option>Стас</option><option>Денис</option><option>Яков</option><option>Алекс</option></select>
<select id="cold"><option disabled selected>Холодная сторона</option><option>Егор</option><option>Стас</option><option>Денис</option><option>Яков</option><option>Алекс</option></select>
<select id="check"><option disabled selected>Проверяющий</option><option>Егор</option><option>Стас</option><option>Денис</option><option>Яков</option><option>Алекс</option></select>
</div>

<!-- ВЫБРОС -->
<div class="card">
<div class="label">Выброс продукции (л)</div>
<div id="wasteToggle" class="add-btn">Показать список</div>
<div id="wasteList" class="hidden"></div>
</div>

<!-- ОПИСАНИЕ -->
<div class="card">
<div class="label">Описание смены</div>
<textarea id="summary"></textarea>
<span id="toggleBtn" class="tag hints-toggle">Подсказки</span>
<div id="hints" class="hidden"></div>
</div>

<!-- ЗАГОТОВКИ -->
<div class="card">
<div class="label">Заготовки</div>
<div id="prepContainer"></div>
<div class="add-btn" id="addPrepBtn">+ Добавить сотрудника</div>
</div>

<!-- ПРОБЛЕМЫ -->
<div class="card">
<div class="label">Проблемы</div>
<textarea id="problem"></textarea>
<input type="file" id="problemPhoto">
</div>

<button onclick="goTraining()">Далее →</button>

</div>

<!-- TRAINING -->
<div id="training" class="hidden">
<h2>Ученичество</h2>
<div class="card">
<div class="label">Выбор ученика</div>
<select id="student">
<option>Нет</option>
<option>Егор</option><option>Стас</option><option>Денис</option><option>Яков</option><option>Алекс</option>
</select>
</div>
<div class="card">
<div class="label">Описание ученичества</div>
<textarea id="study"></textarea>
</div>
<button onclick="send()">Отправить</button>
</div>

<div id="done" class="hidden">
<h2>Спасибо! Отчет отправлен ✅</h2>
<button onclick="location.reload()">Новый отчет</button>
</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzKqNQrcOo5it_hb21N8TjXJm8MP6Q_suN071vT5tbMms2p8f30brF5xW9ymLqTdLc9vQ/exec";

let state={user:"",pin:"",waste:{},prep:[]};

/* LOGIN */
function selectUser(name){
state.user=name;
state.pin="";
updatePin();
show("pin");
}

/* NAV */
function show(id){
["login","pin","form","training","done","loading"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

/* PIN */
const pad=document.getElementById("pad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
const b=document.createElement("div");
b.className="pin-btn";
b.innerText=n;

b.onclick=()=>{
if(n==="←"){state.pin=state.pin.slice(0,-1);}
else if(state.pin.length<4){state.pin+=n;}
updatePin();
if(state.pin.length===4){checkPin();}
};

pad.appendChild(b);
});

function updatePin(){
document.querySelectorAll(".pin-cell").forEach((c,i)=>{
c.innerHTML=i<state.pin.length?"<div class='pin-dot'></div>":"";
});
}

async function checkPin(){
show("loading");

const res=await fetch(SCRIPT_URL,{
method:"POST",
body: JSON.stringify({
type:"auth",
user:state.user,
pin:state.pin
})
});

const json=await res.json();

if(json.status==="ok"||json.status==="created"){
show("form");
date.valueAsDate=new Date();
}else{
alert("Неверный PIN");
state.pin="";
updatePin();
show("pin");
}
}

/* READY */
function checkReady(){
lowBlock.classList.toggle("hidden",ready.value>=4);
}

/* ВЫБРОС */
const wasteProducts=["Котлеты","Куриная Грудка","Шницелоним","Шницели","Шаурма","Бийонд","Бургул","Рис","Тхина","Чимичури","Чипотле","Острый лимон","Гуакамоли","Сальса","Соус Чедар","Пельпель Калуи","Колслоу","Квашенная капуста","Пюре","Десерты"];

let wasteList, wasteToggle, toggleBtn, hints, prepContainer, addPrepBtn;

function toggleWaste(){
const isHidden=wasteList.classList.contains("hidden");
wasteList.classList.toggle("hidden");
wasteToggle.innerText=isHidden?"Скрыть список":"Показать список";
}

function renderWaste(){
wasteList.innerHTML="";
wasteProducts.forEach(p=>{
const row=document.createElement("div");
row.style.display="flex";
row.style.alignItems="center";
row.style.gap="10px";

const tag=document.createElement("div");
tag.className="tag";
tag.innerText=p;
tag.style.flex="1";

const input=document.createElement("input");
input.type="number";
input.placeholder="л";
input.style.width="80px";
input.style.display="none";

if(state.waste[p]){
tag.classList.add("active");
input.style.display="block";
input.value=state.waste[p];
}

tag.onclick=()=>{
if(state.waste[p]) delete state.waste[p];
else state.waste[p]="";
renderWaste();
};

input.oninput=()=>{
if(input.value) state.waste[p]=input.value;
else delete state.waste[p];
};

row.appendChild(tag);
row.appendChild(input);
wasteList.appendChild(row);
});
}

/* ПОДСКАЗКИ */
const hintsArr=[...[
"Большая нагрузка","Нехватка персонала","Задержки заказов","Ошибки сборки","Медленная кухня",
"Очередь","Нет ингредиентов","Перегруз кухни","Долгое ожидание","Проблемы с поставками",
"Не хватило заготовок","Сломалось оборудование","Проблемы с кассой","Неправильные заказы",
"Слабая коммуникация","Сильный поток клиентов","Проблемы с доставкой","Нет упаковки",
"Ошибки кухни","Долгое приготовление","Не хватило персонала","Перегруз на гриле",
"Перегруз на сборке","Проблемы с чистотой","Задержка открытия","Нехватка соусов",
"Не хватает продуктов","Проблемы с холодильником","Неправильная выдача",
"Проблемы с учеником","Плохая организация","Слабая подготовка","Ошибки в заготовках",
"Проблемы с температурой","Медленная работа","Нет контроля","Проблемы с качеством",
"Перепутали заказы","Проблемы с логистикой","Плохая смена","Хорошая смена",
"Отличная команда","Все прошло гладко","Быстрая работа","Клиенты довольны",
"Высокий чек","Хорошая коммуникация","Чистая кухня","Все по стандарту"
]];

function toggleHints(){
const isOpen=!hints.classList.contains("hidden");
hints.classList.toggle("hidden");
toggleBtn.classList.toggle("active");

if(!isOpen){
hints.innerHTML="";
hintsArr.forEach(h=>{
const t=document.createElement("div");
t.className="tag";
t.innerText=h;
t.onclick=()=>summary.value+=h+", ";
hints.appendChild(t);
});
}
}

/* ЗАГОТОВКИ */
const prepItems=["Помидоры","Огурцы","Лук красный","Лук белый","Капуста","Морковь","Картошка","Гуакамоле","Сальса","Чимичури","Квашеная капуста"];
const workers=["Егор","Стас","Денис","Яков","Алекс"];

function addPrep(){state.prep.push({user:"",items:[]});renderPrep();}

function renderPrep(){
prepContainer.innerHTML="";
state.prep.forEach(block=>{
const wrap=document.createElement("div");

const select=document.createElement("select");
const def=document.createElement("option");
def.innerText="Выбери сотрудника";
def.disabled=true;
def.selected=!block.user;
select.appendChild(def);

workers.forEach(w=>{
const o=document.createElement("option");
o.innerText=w;
if(block.user===w)o.selected=true;
select.appendChild(o);
});

select.onchange=(e)=>{block.user=e.target.value;renderPrep();};
wrap.appendChild(select);

if(block.user){
const tags=document.createElement("div");
prepItems.forEach(item=>{
const t=document.createElement("div");
t.className="tag";
t.innerText=item;
if(block.items.includes(item))t.classList.add("active");
t.onclick=()=>{
if(block.items.includes(item)){
block.items=block.items.filter(i=>i!==item);
}else{
block.items.push(item);
}
renderPrep();
};
tags.appendChild(t);
});
wrap.appendChild(tags);
}

prepContainer.appendChild(wrap);
});
}
addPrep();

/* INIT */
document.addEventListener("DOMContentLoaded",()=>{
wasteList=document.getElementById("wasteList");
wasteToggle=document.getElementById("wasteToggle");
toggleBtn=document.getElementById("toggleBtn");
hints=document.getElementById("hints");
prepContainer=document.getElementById("prepContainer");
addPrepBtn=document.getElementById("addPrepBtn");

wasteToggle.onclick=toggleWaste;
toggleBtn.onclick=toggleHints;
addPrepBtn.onclick=addPrep;

renderWaste();
renderPrep();
});

</script>
</body>
</html>
