<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{
margin:0;
background:#0a0a0f;
font-family:-apple-system;
color:white;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
padding:16px;
}

h2{
text-align:center;
margin:20px 0;
}

.card{
background:#15151d;
padding:14px;
border-radius:16px;
margin-bottom:12px;
}

.label{
font-size:13px;
color:#aaa;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#1f1f28;
color:white;
font-size:15px;
box-sizing:border-box;
}

textarea{
resize:none;
height:90px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;
font-size:16px;
margin-top:10px;
}

.tag{
display:inline-block;
padding:6px 10px;
background:#1f1f28;
border-radius:10px;
margin:4px;
font-size:13px;
}

.tag.active{
background:#6d5dfc;
}

.hidden{display:none;}

.pin-box{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}

.pin-cell{
width:50px;
height:50px;
border-radius:12px;
border:2px solid #333;
display:flex;
align-items:center;
justify-content:center;
}

.pin-dot{
width:8px;
height:8px;
background:white;
border-radius:50%;
}

.pin-pad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
justify-items:center;
}

.pin-btn{
width:70px;
height:70px;
border-radius:50%;
background:#1c1c24;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}
</style>
</head>

<body>

<div class="app">

<div id="login">
<h2>Кто менеджер</h2>
<button onclick="selectUser('Егор')">Егор</button>
<button onclick="selectUser('Стас')">Стас</button>
<button onclick="selectUser('Денис')">Денис</button>
</div>

<div id="pin" class="hidden">
<h2>Введите PIN</h2>

<div class="pin-box">
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
<div class="pin-cell"></div>
</div>

<div class="pin-pad" id="pad"></div>
</div>

<div id="form" class="hidden">

<h2>Отчет смены</h2>

<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<div class="card">
<div class="label">Смена</div>
<select id="shift">
<option>Утро</option>
<option>Вечер</option>
</select>
</div>

<div class="card">
<div class="label">Готовность кухни</div>
<select id="ready" onchange="checkReady()">
<option>5</option>
<option>4</option>
<option>3</option>
<option>2</option>
<option>1</option>
</select>
</div>

<div id="lowBlock" class="card hidden">
<div class="label">Причина</div>
<textarea id="lowReason"></textarea>
<input type="file" id="lowPhoto">
</div>

<div class="card">
<div class="label">Выброс продукции</div>
<div id="waste"></div>
</div>

<div class="card">
<div class="label">Описание смены</div>
<textarea id="summary"></textarea>
<button onclick="toggleHints()">Подсказки</button>
<div id="hints" class="hidden"></div>
</div>

<div class="card">
<div class="label">Проблемы</div>
<textarea id="problem"></textarea>
<input type="file" id="problemPhoto">
</div>

<button onclick="goTraining()">Далее →</button>

</div>

<div id="training" class="hidden">
<h2>Ученичество</h2>

<div class="card">
<select id="student">
<option>Нет</option>
<option>Егор</option>
<option>Стас</option>
<option>Денис</option>
<option>Яков</option>
<option>Алекс</option>
</select>
</div>

<div class="card">
<textarea id="study"></textarea>
</div>

<button onclick="send()">Отправить</button>

</div>

<div id="loading" class="hidden">
<h2>⏳ Отправка...</h2>
</div>

<div id="done" class="hidden">
<h2>Спасибо! Отчет отправлен ✅</h2>
<button onclick="location.reload()">Создать новый отчет</button>
</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzKqNQrcOo5it_hb21N8TjXJm8MP6Q_suN071vT5tbMms2p8f30brF5xW9ymLqTdLc9vQ/exec";

let state={user:"",pin:"",waste:{}};

function show(id){
["login","pin","form","training","done","loading"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function selectUser(name){
state.user=name;
state.pin="";
updatePin();
show("pin");
}

const pad=document.getElementById("pad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
const b=document.createElement("div");
b.className="pin-btn";
b.innerText=n;

b.onclick=async ()=>{
if(n==="←"){state.pin=state.pin.slice(0,-1);}
else if(state.pin.length<4){state.pin+=n;}

updatePin();

if(state.pin.length===4){
await checkPin();
}
};

pad.appendChild(b);
});

function updatePin(){
const cells=document.querySelectorAll(".pin-cell");
cells.forEach((c,i)=>{
c.innerHTML = i < state.pin.length ? "<div class='pin-dot'></div>" : "";
});
}

async function checkPin(){
const res = await fetch(SCRIPT_URL,{
method:"POST",
body: JSON.stringify({
type:"auth",
user:state.user,
pin:state.pin
})
});

const json=await res.json();

if(json.status==="ok"||json.status==="created"){
show("form");
date.valueAsDate=new Date();
}else{
alert("Неверный PIN");
state.pin="";
updatePin();
}
}

function checkReady(){
if(ready.value<4){
lowBlock.classList.remove("hidden");
}else{
lowBlock.classList.add("hidden");
}
}

const products=["Гуакамоле","Курица","Котлеты","Сальса","Тхина","Перец"];

products.forEach(p=>{
const t=document.createElement("div");
t.className="tag";
t.innerText=p;

t.onclick=()=>{
if(!state.waste[p]){
state.waste[p]=1;
t.classList.add("active");
}else{
delete state.waste[p];
t.classList.remove("active");
}
};

waste.appendChild(t);
});

const hintsArr=["Большая нагрузка","Нехватка персонала","Задержки заказов","Очередь","Медленная кухня","Ошибки сборки"];

function toggleHints(){
hints.classList.toggle("hidden");
hints.innerHTML="";
hintsArr.forEach(h=>{
const t=document.createElement("div");
t.className="tag";
t.innerText=h;
t.onclick=()=>summary.value+=h+", ";
hints.appendChild(t);
});
}

function toBase64(file){
return new Promise(res=>{
if(!file) return res("");
const reader=new FileReader();
reader.onload=()=>res(reader.result.split(",")[1]);
reader.readAsDataURL(file);
});
}

function goTraining(){
show("training");
}

async function send(){

show("loading");

const photos={
problem: await toBase64(problemPhoto.files[0]),
low: await toBase64(lowPhoto.files[0])
};

const data={
type:"report",
user:state.user,
date:date.value,
shift:shift.value,
ready:ready.value,
lowReason:lowReason.value,
summary:summary.value,
problem:problem.value,
waste:state.waste,
student:student.value,
study:study.value,
photos
};

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
});

show("done");
}

</script>

</body>
</html>
