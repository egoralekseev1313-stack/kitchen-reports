<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{margin:0;background:#0a0a0f;font-family:-apple-system;color:white;display:flex;justify-content:center;}
.app{width:100%;max-width:420px;padding:16px;}
h2{text-align:center;margin:20px 0;}

.card{background:#15151d;padding:16px;border-radius:18px;margin-bottom:14px;}
.label{font-size:13px;color:#aaa;margin-bottom:8px;}

input,select,textarea{
width:100%;padding:12px;border-radius:12px;border:none;
background:#1f1f28;color:white;font-size:15px;margin-bottom:10px;
}

textarea{resize:none;height:100px;}

button{
width:100%;padding:14px;border:none;border-radius:14px;
background:linear-gradient(135deg,#6d5dfc,#8b7cff);
color:white;font-size:16px;margin-top:10px;
}

.tag{
display:inline-block;padding:7px 11px;background:#1f1f28;
border-radius:10px;margin:4px;font-size:13px;cursor:pointer;
}
.tag.active{background:#6d5dfc;}

.hidden{display:none;}

.add-btn{
margin-top:10px;
background:#1f1f28;
text-align:center;
padding:10px;
border-radius:10px;
cursor:pointer;
}

/* ВЫБРОС */
.waste-toggle{
background:#1f1f28;
padding:10px;
border-radius:10px;
text-align:center;
margin-bottom:10px;
cursor:pointer;
}

.waste-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.waste-input{
width:70px;
padding:6px;
border-radius:10px;
background:#0f0f15;
text-align:center;
}

/* BACK */
.back-btn{
background:#1f1f28;
margin-top:10px;
}
</style>
</head>

<body>
<div class="app">

<h2>Отчет смены</h2>

<div id="form">

<!-- ДАТА -->
<div class="card">
<div class="label">Дата</div>
<input type="date" id="date">
</div>

<!-- ВЫБРОС -->
<div class="card">
<div class="label">Выброс продукции (л)</div>

<div class="waste-toggle" onclick="toggleWaste()">Добавить выброс</div>

<div id="wasteBlock" class="hidden">
<div id="wasteTags"></div>
<div id="wasteInputs"></div>
</div>

</div>

<!-- ОПИСАНИЕ -->
<div class="card">
<div class="label">Описание смены</div>
<textarea id="summary"></textarea>

<div class="tag" onclick="toggleHints()">Подсказки</div>
<div id="hints" class="hidden"></div>
</div>

<!-- ЗАГОТОВКИ -->
<div class="card">
<div class="label">Заготовки</div>
<div id="prepContainer"></div>
<div class="add-btn" onclick="addPrep()">+ Добавить сотрудника</div>
</div>

<!-- ПРОБЛЕМЫ -->
<div class="card">
<div class="label">Проблемы</div>
<textarea></textarea>
<input type="file">
</div>

<button onclick="goTraining()">Далее →</button>

</div>

<!-- СТРАНИЦА 2 -->
<div id="training" class="hidden">

<h2>Ученичество</h2>

<div class="card">
<div class="label">Выбор ученика</div>
<select>
<option>Нет</option>
<option>Егор</option>
<option>Стас</option>
<option>Денис</option>
<option>Яков</option>
<option>Алекс</option>
</select>
</div>

<div class="card">
<div class="label">Описание ученичества</div>
<textarea></textarea>
</div>

<button class="back-btn" onclick="back()">← Назад</button>
<button>Отправить</button>

</div>

</div>

<script>

/* -------- ВЫБРОС -------- */
let state={waste:{}};
let selectedWaste=[];

const wasteProducts=[
"Котлеты","Куриная Грудка","Шницелоним","Шницели","Шаурма","Бийонд",
"Бургул","Рис","Тхина","Чимичури","Чипотле","Острый лимон","Гуакамоли",
"Сальса","Соус Чедар","Пельпель Калуи","Колслоу","Квашенная капуста",
"Пюре","Десерты"
];

function toggleWaste(){
wasteBlock.classList.toggle("hidden");
}

wasteProducts.forEach(p=>{
const t=document.createElement("div");
t.className="tag";
t.innerText=p;

t.onclick=()=>{
if(selectedWaste.includes(p)){
selectedWaste=selectedWaste.filter(x=>x!==p);
delete state.waste[p];
}else{
selectedWaste.push(p);
state.waste[p]=0;
}
renderWasteInputs();
updateTags();
};

wasteTags.appendChild(t);
});

function updateTags(){
[...wasteTags.children].forEach(tag=>{
tag.classList.toggle("active", selectedWaste.includes(tag.innerText));
});
}

function renderWasteInputs(){
wasteInputs.innerHTML="";
selectedWaste.forEach(p=>{
const row=document.createElement("div");
row.className="waste-item";

const name=document.createElement("div");
name.innerText=p;

const input=document.createElement("input");
input.type="number";
input.placeholder="л";
input.className="waste-input";

input.oninput=()=>{state.waste[p]=input.value;};

row.appendChild(name);
row.appendChild(input);
wasteInputs.appendChild(row);
});
}

/* -------- ПОДСКАЗКИ (60+) -------- */
const hintsArr=[
"Смена была динамичной","Смена была супер легкой","Смена выдалась крайне тяжело",
"Много заказов","Очень большой поток гостей","Очереди на кассе",
"Задержки заказов","Работали быстро","Отличная командная работа",
"Нехватка персонала","Не хватало поваров","Перегруз кухни",
"Ошибки в заказах","Ошибки сборки","Путаница в заказах",
"Официанты не успевали","Задержки на выдаче","Плохая коммуникация",
"Отличная коммуникация","Все работали слаженно","Хорошая смена",
"Отличная смена","Плохая смена","Слабая организация",
"Сильная команда","Все прошло гладко","Клиенты довольны",
"Много возвратов","Проблемы с качеством","Проблемы с поставками",
"Не хватило ингредиентов","Закончились заготовки",
"Быстро сделали заготовки","Хорошая подготовка кухни",
"Плохая подготовка","Опоздали с открытием","Все открыли вовремя",
"Проблемы с оборудованием","Все оборудование работало",
"Слабая скорость","Отличная скорость","Долгое ожидание",
"Хорошая выручка","Высокий чек","Низкий чек",
"Много доставок","Проблемы с доставкой","Все доставляли вовремя"
];

function toggleHints(){
hints.classList.toggle("hidden");
hints.innerHTML="";
hintsArr.forEach(h=>{
const t=document.createElement("div");
t.className="tag";
t.innerText=h;
t.onclick=()=>summary.value+=h+", ";
hints.appendChild(t);
});
}

/* -------- ЗАГОТОВКИ -------- */
const workers=["Егор","Стас","Денис","Яков","Алекс"];
const prepItems=["Помидоры","Огурцы","Лук красный","Лук белый","Капуста","Морковь","Картошка","Гуакамоле","Сальса","Чимичури"];

let prepState=[];

function addPrep(){
prepState.push({user:"",items:[]});
renderPrep();
}

function renderPrep(){
prepContainer.innerHTML="";

prepState.forEach(block=>{

const wrap=document.createElement("div");

const select=document.createElement("select");

const def=document.createElement("option");
def.innerText="Выбери сотрудника";
def.disabled=true;
def.selected=!block.user;
select.appendChild(def);

workers.forEach(w=>{
const o=document.createElement("option");
o.innerText=w;
if(block.user===w) o.selected=true;
select.appendChild(o);
});

select.onchange=(e)=>{
block.user=e.target.value;
renderPrep();
};

wrap.appendChild(select);

if(block.user){
const tags=document.createElement("div");

prepItems.forEach(item=>{
const t=document.createElement("div");
t.className="tag";
t.innerText=item;

if(block.items.includes(item)) t.classList.add("active");

t.onclick=()=>{
if(block.items.includes(item)){
block.items=block.items.filter(i=>i!==item);
}else{
block.items.push(item);
}
renderPrep();
};

tags.appendChild(t);
});

wrap.appendChild(tags);
}

prepContainer.appendChild(wrap);

});
}

addPrep();

/* -------- НАВИГАЦИЯ -------- */
function goTraining(){
form.classList.add("hidden");
training.classList.remove("hidden");
}

function back(){
training.classList.add("hidden");
form.classList.remove("hidden");
}

</script>
</body>
</html>
